<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>E-Mining AI v3</title>
<style>
:root{
  --bg:#080c10;--bg2:#0f1318;--bg3:#161c24;--bg4:#1e2730;
  --border:#2a3340;--border2:#3a4858;
  --text:#e2e8f0;--text2:#8fa0b0;--text3:#5a7080;
  --green:#00d68f;--green2:#00b377;--gdim:rgba(0,214,143,.12);--gglow:rgba(0,214,143,.25);
  --yellow:#fbbf24;--ydim:rgba(251,191,36,.12);
  --purple:#a78bfa;--pdim:rgba(167,139,250,.12);
  --red:#f87171;--rdim:rgba(248,113,113,.12);
  --blue:#60a5fa;--bdim:rgba(96,165,250,.12);
  --orange:#fb923c;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'Courier New',monospace;
  --radius:10px;--hh:52px;--nh:54px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ═══════════════════════════════════
   LOGIN
═══════════════════════════════════ */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:16px;
  background:radial-gradient(ellipse at 30% 50%,rgba(0,214,143,.06),transparent 60%),
             radial-gradient(ellipse at 75% 20%,rgba(96,165,250,.04),transparent 50%),var(--bg);
}
.login-box{width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.logo-icon{width:44px;height:44px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:22px;height:22px;stroke:#000;fill:none;stroke-width:2.2}
.logo-text h1{font-size:22px;font-weight:700}
.logo-text p{font-size:11px;color:var(--text2);font-family:var(--mono)}
.lcard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px}
.lcard h2{font-size:16px;font-weight:700;margin-bottom:4px}
.lcard>p{font-size:12px;color:var(--text2);margin-bottom:20px}

/* Tabs register/login */
.auth-tabs{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:7px;text-align:center;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:.2s;border:none;background:none;font-family:var(--font)}
.auth-tab.on{background:var(--bg4);color:var(--text);border:1px solid var(--border)}

.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.inp-wrap{position:relative}
.form-inp{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:.15s;
}
.form-inp:focus{border-color:var(--green)}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;display:flex;align-items:center}
.pw-toggle:hover{color:var(--text)}
.pw-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}

.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.role-opt{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.2s;text-align:center}
.role-opt:hover{border-color:var(--border2)}
.role-opt.sel{border-color:var(--green);background:var(--gdim)}
.role-opt .ri{font-size:24px;margin-bottom:5px}
.role-opt .rt{font-size:12px;font-weight:700}
.role-opt .rs{font-size:10px;color:var(--text2);margin-top:2px}

.btn-primary{
  width:100%;padding:11px;background:var(--green);color:#000;border:none;
  border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.2s;
}
.btn-primary:hover{background:var(--green2)}
.btn-primary:active{transform:scale(.98)}
.err-msg{color:var(--red);font-size:11px;margin-top:8px;display:none}
.ok-msg{color:var(--green);font-size:11px;margin-top:8px;display:none}

.test-box{margin-top:18px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.test-box p{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
.test-row{display:flex;gap:6px;flex-wrap:wrap}
.test-btn{
  font-size:10px;padding:4px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--border);
  background:var(--bg4);color:var(--text2);font-family:var(--mono);transition:.15s;
}
.test-btn:hover{border-color:var(--green);color:var(--green)}

/* ═══════════════════════════════════
   APP SHELL
═══════════════════════════════════ */
#app{display:none;min-height:100vh;padding-bottom:var(--nh)}

/* HEADER */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;height:var(--hh);display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo-icon{width:28px;height:28px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo-icon svg{width:14px;height:14px;stroke:#000;fill:none;stroke-width:2.2}
.hdr-title{font-size:15px;font-weight:700}
.hdr-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;font-weight:600}
.badge-seller{background:var(--gdim);color:var(--green);border:1px solid rgba(0,214,143,.2)}
.badge-enterprise{background:var(--bdim);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.hdr-user{font-size:11px;color:var(--text2);display:none}
@media(min-width:600px){.hdr-user{display:block}}
.btn-logout{
  margin-left:auto;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;
  background:var(--rdim);color:var(--red);border:1px solid rgba(248,113,113,.2);
  font-family:var(--font);font-weight:600;white-space:nowrap;
}

/* STATS BAR */
.stats-bar{display:grid;gap:8px;padding:10px 12px;overflow-x:auto}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;min-width:80px}
.sv{font-size:16px;font-weight:700;margin-bottom:2px;font-family:var(--mono);white-space:nowrap}
.sl{font-size:10px;color:var(--text2);white-space:nowrap}

/* BODY */
.body{padding:0 12px 12px;max-width:900px;margin:0 auto}
.page{display:none}.page.on{display:block;padding-top:12px}

/* BOTTOM NAV (mobile) */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nh);
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  z-index:100;padding:0 4px;
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:6px 2px;cursor:pointer;border:none;background:none;
  color:var(--text2);font-size:9px;font-family:var(--font);font-weight:600;
  border-radius:8px;transition:.15s;
}
.bn:hover{color:var(--text)}
.bn.on{color:var(--green)}
.bn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.ct{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;font-family:var(--mono)}

/* BUTTONS */
.btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;font-family:var(--font)}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--green);color:#000}.btn-g:hover{background:var(--green2)}
.btn-g:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.btn-o{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-o:hover{background:var(--bg4)}
.btn-blue{background:var(--bdim);color:var(--blue);border:1px solid rgba(96,165,250,.25)}.btn-blue:hover{background:rgba(96,165,250,.2)}
.btn-red{background:var(--rdim);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-yellow{background:var(--ydim);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
.btn-w{width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* FORM */
.inp{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:8px 11px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;
  margin-bottom:8px;transition:.15s;
}
.inp:focus{border-color:var(--green)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.inp-row .inp{margin-bottom:0}
.s-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;margin-top:4px;display:block}
.radio-group{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.radio-opt{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:.2s;min-width:120px}
.radio-opt.sel{border-color:var(--green);background:var(--gdim)}
.radio-opt p{font-size:12px;font-weight:700}
.radio-opt span{font-size:10px;color:var(--text2)}
.tab-row{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.tab{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 11px;border-radius:6px;cursor:pointer;font-family:var(--font);font-weight:600;transition:.15s;white-space:nowrap}
.tab.on{background:var(--gdim);border-color:rgba(0,214,143,.3);color:var(--green)}

/* TAGS */
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap}
.tag-g{background:var(--gdim);color:var(--green)}
.tag-y{background:var(--ydim);color:var(--yellow)}
.tag-b{background:var(--border);color:var(--text2)}
.tag-p{background:var(--pdim);color:var(--purple)}
.tag-r{background:var(--rdim);color:var(--red)}
.tag-blue{background:var(--bdim);color:var(--blue)}

/* MISC */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90px;color:var(--text3);font-size:12px;gap:6px}
.empty svg{width:26px;height:26px;stroke:var(--border2);fill:none;stroke-width:1.5}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.scanning{display:flex;align-items:center;justify-content:center;gap:8px;min-height:110px;color:var(--green);font-size:12px}
.sep{height:1px;background:var(--border);margin:10px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.il{color:var(--text2);flex-shrink:0;margin-right:8px}
.ai-box{background:rgba(0,214,143,.06);border:1px solid rgba(0,214,143,.15);border-radius:7px;padding:10px;margin-bottom:8px;font-size:11px;color:var(--text2)}
.alert-box{background:var(--ydim);border:1px solid rgba(251,191,36,.2);border-radius:7px;padding:10px;font-size:11px;color:var(--text2);margin-bottom:8px}
.prog-bar{background:var(--border);border-radius:4px;height:6px;margin-top:4px}
.prog-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--green),#39d98a);transition:.6s}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.mini-stat{background:var(--bg);border-radius:7px;padding:10px;text-align:center;border:1px solid var(--border)}
.mini-stat .v{font-size:16px;font-weight:700;margin-bottom:2px;font-family:var(--mono)}
.mini-stat .l{font-size:10px;color:var(--text2)}

/* SCAN */
.drop-zone{border:2px dashed var(--border2);border-radius:10px;padding:22px 12px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:10px}
.drop-zone:hover,.drop-zone.over{border-color:var(--green);background:var(--gdim)}
.drop-zone svg{width:28px;height:28px;stroke:var(--green);fill:none;stroke-width:1.5}
.drop-zone p{font-size:11px;color:var(--text2);margin-top:5px}
.cam-view{background:#000;border-radius:10px;position:relative;overflow:hidden;margin-bottom:10px;min-height:150px;display:flex;align-items:center;justify-content:center}
.cam-view video{width:100%;display:block}
.cam-off{color:var(--text2);font-size:11px;text-align:center;padding:20px 0}
@keyframes scanline{0%{top:5%;opacity:1}90%{top:95%;opacity:1}100%{top:95%;opacity:0}}
.scan-line{position:absolute;left:0;right:0;height:2px;background:var(--green);top:0;animation:scanline 2s linear infinite;opacity:0;pointer-events:none;box-shadow:0 0 8px var(--gglow)}
.canvas-wrap{position:relative;display:inline-block;width:100%;margin-bottom:10px}
#bb-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#scan-preview-img{width:100%;border-radius:8px;display:block}
.comp-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.comp-row:last-child{border-bottom:none}
.comp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:6px;border-top:1px solid var(--border)}
.conf-bar{height:3px;border-radius:2px;background:var(--border);margin-top:3px}
.conf-fill{height:3px;border-radius:2px}

/* POST SECTION */
.post-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.post-thumb-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.post-thumb{width:60px;height:60px;background:var(--bg3);border-radius:8px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.post-form{background:var(--bg);border-radius:8px;padding:12px}
.new-scan-bar{background:var(--gdim);border:1px solid rgba(0,214,143,.2);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.new-scan-bar p{font-size:12px;font-weight:600}
.new-scan-bar span{font-size:10px;color:var(--text2)}
.edit-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border)}
.edit-row:last-child{border-bottom:none}
.edit-sel{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 6px;color:var(--text);font-size:11px;font-family:var(--font);outline:none}
.edit-sel:focus{border-color:var(--green)}
.edit-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
.edit-del:hover{color:var(--red)}
.acc-panel{background:linear-gradient(135deg,rgba(0,214,143,.06),rgba(96,165,250,.04));border:1px solid rgba(0,214,143,.2);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.acc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.acc-item{text-align:center}
.acc-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.acc-lbl{font-size:10px;color:var(--text2);margin-top:2px}

/* MARKET */
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 11px;border-radius:6px;cursor:pointer;font-weight:600;white-space:nowrap;transition:.15s}
.filter-btn.on{background:var(--gdim);border-color:rgba(0,214,143,.3);color:var(--green)}
.listing-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:440px){.listing-grid{grid-template-columns:1fr}}
.listing-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.2s}
.listing-card:active{transform:scale(.98)}
.listing-card:hover{border-color:var(--green)}
.listing-img{width:100%;height:88px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.listing-img img{width:100%;height:100%;object-fit:cover}
.listing-img svg{width:28px;height:28px;stroke:var(--border2);fill:none;stroke-width:1.5}
.listing-body{padding:10px}
.listing-title{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.listing-sub{font-size:10px;color:var(--text2);margin-bottom:6px}
.listing-footer{display:flex;align-items:center;justify-content:space-between;gap:4px}
.price{font-size:13px;font-weight:700;color:var(--green);font-family:var(--mono)}
.mine-badge{font-size:9px;background:rgba(0,214,143,.2);color:var(--green);padding:1px 5px;border-radius:3px;font-family:var(--mono)}

/* MY LISTINGS page */
.my-listing-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.my-listing-row:last-child{border-bottom:none}
.my-listing-row:active{opacity:.7}
.ml-thumb{width:38px;height:38px;background:var(--bg3);border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ml-thumb img{width:100%;height:100%;object-fit:cover}
.ml-thumb svg{width:18px;height:18px;stroke:var(--border2);fill:none}

/* ENTERPRISE */
.ent-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
@media(max-width:440px){.ent-stat-grid{grid-template-columns:1fr 1fr}}
.ent-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.ent-stat .v{font-size:22px;font-weight:700;font-family:var(--mono);margin-bottom:3px}
.ent-stat .l{font-size:11px;color:var(--text2)}
.ent-stat .sub{font-size:10px;color:var(--text3);margin-top:2px}
.map-area{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);height:260px;position:relative;overflow:hidden}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(42,51,64,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(42,51,64,.4) 1px,transparent 1px);background-size:40px 40px}
.map-label{position:absolute;font-size:9px;color:var(--text3);font-family:var(--mono)}
.map-pin{position:absolute;cursor:pointer;transform:translate(-50%,-50%);transition:.2s;z-index:2}
.map-pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.6);box-shadow:0 0 6px currentColor;transition:.2s}
.map-pin:hover .map-pin-dot{transform:scale(1.5)}
.map-pin-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:8px;white-space:nowrap;background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;color:var(--text);pointer-events:none}
.route-svg{position:absolute;inset:0;pointer-events:none;z-index:1}
.route-info{position:absolute;bottom:10px;right:10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.route-info .rv{font-size:14px;font-weight:700;color:var(--green);font-family:var(--mono)}
.price-table{width:100%;border-collapse:collapse}
.price-table th{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.price-table td{padding:8px 8px;border-bottom:1px solid var(--border);font-size:12px}
.price-table tr:last-child td{border-bottom:none}
.price-table tr:hover td{background:var(--bg3)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:560px){.modal-bg{align-items:center;padding:16px}}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0}
@media(min-width:560px){.modal{border-radius:16px}}
.modal-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-hdr h3{font-size:14px;font-weight:700}
.close-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;padding:0 2px}
.modal-body{padding:16px}
/* Drag handle for mobile modal */
.modal-drag{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:8px auto 0}

/* CHAT */
.chat-area{height:200px;overflow-y:auto;background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.msg{max-width:80%;padding:7px 11px;border-radius:10px;font-size:12px;line-height:1.5;word-break:break-word}
.msg-me{background:var(--green);color:#000;align-self:flex-end;border-bottom-right-radius:3px;font-weight:500}
.msg-other{background:var(--bg3);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.msg-time{font-size:9px;opacity:.6;margin-top:2px}
.chat-inp-row{display:flex;gap:6px}
.chat-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.chat-inp:focus{border-color:var(--green)}
.qmr{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}

/* HISTORY */
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-icon{width:32px;height:32px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hist-icon svg{width:15px;height:15px;stroke:var(--green);fill:none;stroke-width:1.8}
.tx-item{background:var(--bg);border-radius:7px;padding:8px 10px;margin-bottom:6px;border:1px solid var(--border)}
.tx-hash{color:var(--green);font-family:var(--mono);font-size:9px;margin-top:3px;word-break:break-all}

/* PROFILE */
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.profile-stat{background:var(--bg);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border)}
.profile-stat .v{font-size:17px;font-weight:700;margin-bottom:2px;font-family:var(--mono)}
.profile-stat .l{font-size:10px;color:var(--text2)}
.reward-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.reward-row:last-child{border-bottom:none}
.rw-icon{width:30px;height:30px;background:var(--bg3);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* TOAST */
.toast{
  position:fixed;bottom:calc(var(--nh) + 12px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:10px 16px;font-size:12px;font-weight:600;z-index:300;
  opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(0,214,143,.4);color:var(--green)}
.toast.error{border-color:rgba(248,113,113,.4);color:var(--red)}
.toast.info{border-color:rgba(96,165,250,.4);color:var(--blue)}
</style>

  [{cls:'chip',x:.06,y:.10,w:.28,h:.22},{cls:'chip',x:.50,y:.06,w:.22,h:.20},{cls:'capacitor',x:.18,y:.62,w:.15,h:.22},{cls:'connector',x:.58,y:.55,w:.30,h:.16}],
];

// ═══════════════════════════════════════════════════
// ACCOUNTS — stored in localStorage
// ═══════════════════════════════════════════════════
function loadAccounts(){
  const raw=localStorage.getItem('emining_accounts');
  if(raw) return JSON.parse(raw);
  // defaults
  const defaults={
    user:{pass:'1234',role:'seller',name:'Người dùng (Seller)'},
    buyer:{pass:'4321',role:'enterprise',name:'Doanh nghiệp (Enterprise)'},
  };
  localStorage.setItem('emining_accounts',JSON.stringify(defaults));
  return defaults;
}
function saveAccounts(accs){localStorage.setItem('emining_accounts',JSON.stringify(accs));}

// ═══════════════════════════════════════════════════
// LISTINGS — shared across users via localStorage
// ═══════════════════════════════════════════════════
function loadListings(){
  const raw=localStorage.getItem('emining_listings');
  if(raw) return JSON.parse(raw);
  const defaults=[
    {id:'s1',title:'Bo mạch máy tính cũ Core i5',comps:[{class:'chip',value_vnd:45000,green_credits:15,metal:'Au, Ag',conf:.91},{class:'connector',value_vnd:32000,green_credits:10,metal:'Au',conf:.87}],price:220000,status:'open',method:'pickup',addr:'P.12, Q.Bình Thạnh, TP.HCM',lat:38,lng:32,seller:'Trần Minh Tú',phone:'0901 234 567',note:'',time:'28/04 09:30',co2:205,imgSrc:null,ownerId:'user'},
    {id:'s2',title:'Mainboard server Dell cũ',comps:[{class:'chip',value_vnd:45000,green_credits:15,metal:'Au, Ag',conf:.83},{class:'capacitor',value_vnd:8000,green_credits:3,metal:'Al',conf:.79}],price:350000,status:'open',method:'dropoff',addr:'P.Bến Nghé, Q.1, TP.HCM',lat:62,lng:58,seller:'Lê Thị Hoa',phone:'0912 345 678',note:'',time:'29/04 14:15',co2:142,imgSrc:null,ownerId:'other'},
    {id:'s3',title:'Card màn hình GTX 1060 hỏng',comps:[{class:'chip',value_vnd:45000,green_credits:15,metal:'Au, Ag',conf:.76},{class:'transistor',value_vnd:12000,green_credits:4,metal:'Si',conf:.68}],price:180000,status:'pending',method:'pickup',addr:'Q.Gò Vấp, TP.HCM',lat:32,lng:68,seller:'Phạm Văn Khoa',phone:'0988 765 432',note:'Không lên hình',time:'30/04 08:00',co2:155,imgSrc:null,ownerId:'other'},
  ];
  localStorage.setItem('emining_listings',JSON.stringify(defaults));
  return defaults;
}
function saveListings(){localStorage.setItem('emining_listings',JSON.stringify(listings));}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let accounts=loadAccounts();
let listings=loadListings();
let S={
  user:'',role:'',credits:0,co2:0,boards:0,totalVnd:0,
  scanResult:null,currentImgSrc:null,scanCount:0,
  prevHash:'0000000000000000',
  scanHistory:[],sellHistory:[],txChain:[],
  camStream:null,pickupMode:'dropoff',
  currentListingId:null,chatHistory:{},
  routeSelected:[],regRole:'seller',
};

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const now=()=>new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
function shash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return Math.abs(h).toString(16).padStart(16,'0');}
function toast(msg,type='success',dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),dur);
}
function saveSession(){
  sessionStorage.setItem('emining_'+S.user,JSON.stringify({
    credits:S.credits,co2:S.co2,boards:S.boards,totalVnd:S.totalVnd,
    txChain:S.txChain,scanHistory:S.scanHistory,sellHistory:S.sellHistory,
  }));
}
function loadSession(u){
  const raw=sessionStorage.getItem('emining_'+u);
  if(!raw) return;
  const d=JSON.parse(raw);
  S.credits=d.credits||0;S.co2=d.co2||0;S.boards=d.boards||0;S.totalVnd=d.totalVnd||0;
  S.txChain=d.txChain||[];S.scanHistory=d.scanHistory||[];S.sellHistory=d.sellHistory||[];
}

// ═══════════════════════════════════════════════════
// LOGIN / REGISTER
// ═══════════════════════════════════════════════════
let authMode='login';
function switchAuthTab(m){
  authMode=m;
  document.getElementById('tab-login').classList.toggle('on',m==='login');
  document.getElementById('tab-register').classList.toggle('on',m==='register');
  document.getElementById('form-login').style.display=m==='login'?'block':'none';
  document.getElementById('form-register').style.display=m==='register'?'block':'none';
  document.getElementById('l-err').style.display='none';
  document.getElementById('r-err').style.display='none';
  document.getElementById('r-ok').style.display='none';
}
function selRole(r){
  S.regRole=r;
  document.getElementById('r-seller').classList.toggle('sel',r==='seller');
  document.getElementById('r-enterprise').classList.toggle('sel',r==='enterprise');
}
function togglePw(inputId,iconId){
  const inp=document.getElementById(inputId);
  const isHidden=inp.type==='password';
  inp.type=isHidden?'text':'password';
  const svg=document.getElementById(iconId);
  svg.innerHTML=isHidden
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
function fillLogin(u,p){
  document.getElementById('l-user').value=u;
  document.getElementById('l-pass').value=p;
  switchAuthTab('login');
}
function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  accounts=loadAccounts();
  const acc=accounts[u];
  if(!acc||acc.pass!==p){err.style.display='block';return;}
  err.style.display='none';
  S.user=u;S.role=acc.role;S.scanCount=0;S.scanResult=null;S.currentImgSrc=null;S.routeSelected=[];
  S.credits=0;S.co2=0;S.boards=0;S.totalVnd=0;S.txChain=[];S.scanHistory=[];S.sellHistory=[];
  loadSession(u);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  buildApp();
}
function doRegister(){
  const u=document.getElementById('r-user').value.trim();
  const name=document.getElementById('r-name').value.trim();
  const p=document.getElementById('r-pass').value;
  const p2=document.getElementById('r-pass2').value;
  const err=document.getElementById('r-err');
  const ok=document.getElementById('r-ok');
  err.style.display='none';ok.style.display='none';
  accounts=loadAccounts();
  if(u.length<3){err.textContent='❌ Tên đăng nhập tối thiểu 3 ký tự';err.style.display='block';return;}
  if(/[^\w]/.test(u)){err.textContent='❌ Tên đăng nhập chỉ được dùng chữ, số, gạch dưới';err.style.display='block';return;}
  if(accounts[u]){err.textContent='❌ Tên đăng nhập đã tồn tại';err.style.display='block';return;}
  if(!name){err.textContent='❌ Vui lòng nhập họ tên';err.style.display='block';return;}
  if(p.length<4){err.textContent='❌ Mật khẩu tối thiểu 4 ký tự';err.style.display='block';return;}
  if(p!==p2){err.textContent='❌ Mật khẩu xác nhận không khớp';err.style.display='block';return;}
  accounts[u]={pass:p,role:S.regRole,name};
  saveAccounts(accounts);
  ok.style.display='block';
  setTimeout(()=>{
    document.getElementById('l-user').value=u;
    document.getElementById('l-pass').value=p;
    switchAuthTab('login');
  },1500);
}
function doLogout(){
  saveSession();saveListings();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ═══════════════════════════════════════════════════
// BUILD APP
// ═══════════════════════════════════════════════════
function buildApp(){
  const isSeller=S.role==='seller';
  document.getElementById('hdr-badge').textContent=isSeller?'SELLER':'ENTERPRISE';
  document.getElementById('hdr-badge').className='hdr-badge '+(isSeller?'badge-seller':'badge-enterprise');
  document.getElementById('hdr-user').textContent=S.user;
  buildNav(isSeller);
  const body=document.getElementById('main-body');
  body.innerHTML=isSeller?buildSellerHTML():buildEnterpriseHTML();
  renderStats();
  renderMarket('all');
  renderHistoryLists();
  if(!isSeller){renderDashboard();renderRoute();}
}

// ═══════════════════════════════════════════════════

  {id:'market',icon:'M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6',label:'Sàn'},
  {id:'history',icon:'M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z',label:'Lịch sử'},
  {id:'profile',icon:'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z',label:'Hồ sơ'},

function buildNav(isSeller){
  const items=isSeller?SELLER_NAV:ENT_NAV;
  document.getElementById('bottom-nav').innerHTML=items.map((n,i)=>`
    <button class="bn ${i===0?'on':''}" id="bn-${n.id}" onclick="gp('${n.id}',this)">
      <svg viewBox="0 0 24 24"><path d="${n.icon}"/></svg>
      ${n.label}
    </button>`).join('');
}
function gp(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name)?.classList.add('on');
  if(btn) btn.classList.add('on');
  else document.getElementById('bn-'+name)?.classList.add('on');
  if(name==='market') renderMarket('all');
  if(name==='route') renderRoute();
  if(name==='dashboard') renderDashboard();
  if(name==='mylistings') renderMyListings();
  window.scrollTo(0,0);
}

function renderStats(){
  const isSeller=S.role==='seller';
  const bar=document.getElementById('stats-bar');
  const myL=listings.filter(l=>l.ownerId===S.user);
  const active=myL.filter(l=>l.status==='open').length;
  const sold=myL.filter(l=>l.status==='done').length;
  const earned=myL.filter(l=>l.status==='done').reduce((s,l)=>s+l.price,0);
  if(isSeller){
    bar.style.gridTemplateColumns='repeat(6,1fr)';
    bar.innerHTML=`
      <div class="stat"><div class="sv" style="color:var(--green)">${S.credits}</div><div class="sl">Tín chỉ xanh</div></div>
      <div class="stat"><div class="sv">${S.boards}</div><div class="sl">Đã quét</div></div>
      <div class="stat"><div class="sv" style="color:var(--yellow)">${active}</div><div class="sl">Đang bán</div></div>
      <div class="stat"><div class="sv" style="color:var(--purple)">${sold}</div><div class="sl">Đã bán</div></div>
      <div class="stat"><div class="sv" style="color:#4ade80">${S.co2}g</div><div class="sl">CO₂ tiết kiệm</div></div>
      <div class="stat"><div class="sv" style="color:var(--yellow)">${Math.round(earned/1000)}</div><div class="sl">Thu (nghìn đ)</div></div>`;
    // Profile
    const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
    set('pp-credits',S.credits);set('pp-boards',S.boards);set('pp-co2',S.co2+'g');
    set('pp-active',active);set('pp-sold',sold);set('pp-vnd',Math.round(earned/1000));
    // Level
    const LEVELS=[[0,'Cấp 1 — Người mới',100],[100,'Cấp 2 — Nhà tái chế',300],[300,'Cấp 3 — Chiến binh xanh',600],[600,'Cấp 4 — Anh hùng môi trường',1000],[1000,'Cấp 5 — Huyền thoại xanh',9999]];
    const lv=LEVELS.find(l=>S.credits<l[2])||LEVELS[4];
    const prev=LEVELS[LEVELS.indexOf(lv)-1];
    const base=prev?prev[0]:0;
    const pct=Math.min(100,Math.round((S.credits-base)/(lv[2]-base)*100));
    set('p-level',lv[1]);
    const prog=document.getElementById('p-prog');if(prog)prog.style.width=pct+'%';
    set('p-prog-label',`${S.credits} / ${lv[2]} tín chỉ`);
    // My listing stats
    set('ml-open',active);set('ml-pend',myL.filter(l=>l.status==='pending').length);set('ml-done',sold);
  } else {
    const openL=listings.filter(l=>l.status==='open').length;
    const totalCo2=listings.reduce((s,l)=>s+l.co2,0);
    const budget=listings.filter(l=>l.status==='open').reduce((s,l)=>s+l.price,0);
    bar.style.gridTemplateColumns='repeat(5,1fr)';
    bar.innerHTML=`
      <div class="stat"><div class="sv" style="color:var(--green)">${openL}</div><div class="sl">Open</div></div>
      <div class="stat"><div class="sv" style="color:#4ade80">${totalCo2}g</div><div class="sl">CO₂ hệ thống</div></div>
      <div class="stat"><div class="sv" style="color:var(--yellow)">${Math.round(budget/1000)}</div><div class="sl">Ngân sách (k)</div></div>
      <div class="stat"><div class="sv" style="color:var(--purple)">${listings.filter(l=>l.status==='pending').length}</div><div class="sl">Pending</div></div>
      <div class="stat"><div class="sv" style="color:var(--text2)">${listings.filter(l=>l.status==='done').length}</div><div class="sl">Done</div></div>`;
    // Dashboard
    const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
    set('ent-open',openL);set('ent-co2',totalCo2+'g');set('ent-budget',Math.round(budget/1000));
  }
}

    <div class="comp-row" style="border-bottom:1px solid var(--border)"><div class="comp-dot" style="background:#4ade80"></div><div style="flex:1;font-size:12px">Tương đương trồng cây</div><span style="font-family:var(--mono);font-size:12px;color:#4ade80">${Math.round(totalCo2/21000*10)/10} cây</span></div>
    <div class="comp-row"><div class="comp-dot" style="background:var(--blue)"></div><div style="flex:1;font-size:12px">ESG Score (ước tính)</div><span style="font-family:var(--mono);font-size:12px;color:var(--blue)">B+</span></div>`;

// INPUT / CAMERA
// ═══════════════════════════════════════════════════
function switchInput(mode,btn){
  document.querySelectorAll('#pg-scan .tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('mode-upload').style.display=mode==='upload'?'block':'none';
  document.getElementById('mode-camera').style.display=mode==='camera'?'block':'none';
  if(mode==='upload') stopCam();
}
function handleDrop(e){e.preventDefault();e.currentTarget.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))processFile(f);}
function loadImg(e){const f=e.target.files[0];if(f)processFile(f);}
function processFile(f){
  const r=new FileReader();
  r.onload=ev=>{
    S.currentImgSrc=ev.target.result;
    document.getElementById('drop-zone').style.display='none';
    document.getElementById('scan-btn').disabled=false;
  };
  r.readAsDataURL(f);
}
async function startCam(){
  try{
    S.camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('cam-vid');v.srcObject=S.camStream;v.style.display='block';
    document.getElementById('cam-off').style.display='none';
    document.getElementById('cap-btn').disabled=false;document.getElementById('stop-btn').disabled=false;
    document.getElementById('start-cam').disabled=true;document.getElementById('scan-line').style.display='block';
  }catch{toast('Không thể truy cập camera. Dùng chế độ tải ảnh.','error');}
}
function stopCam(){
  if(S.camStream){S.camStream.getTracks().forEach(t=>t.stop());S.camStream=null;}
  const v=document.getElementById('cam-vid');if(!v)return;
  v.style.display='none';v.srcObject=null;
  document.getElementById('scan-line').style.display='none';
  document.getElementById('cam-off').style.display='block';
  const cap=document.getElementById('cap-btn');if(cap)cap.disabled=true;
  const stp=document.getElementById('stop-btn');if(stp)stp.disabled=true;
  const strt=document.getElementById('start-cam');if(strt)strt.disabled=false;
}
function captureFrame(){
  const v=document.getElementById('cam-vid');
  const c=document.getElementById('cam-canvas');
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  const url=c.toDataURL('image/jpeg',.85);
  const cp=document.getElementById('cap-prev');cp.src=url;cp.style.display='block';
  S.currentImgSrc=url;document.getElementById('scan-btn').disabled=false;stopCam();
}

// SCAN
// ═══════════════════════════════════════════════════
async function doScan(){
  const btn=document.getElementById('scan-btn');
  const area=document.getElementById('result-area');
  btn.disabled=true;btn.textContent='Đang phân tích...';
  area.innerHTML=`<div class="scanning"><div class="spinner"></div>AI đang nhận diện...</div>`;
  document.getElementById('post-section').style.display='none';
  document.getElementById('nsbar').style.display='none';
  document.getElementById('bb-wrap').style.display='none';
  document.getElementById('edit-section').style.display='none';
  await new Promise(r=>setTimeout(r,1600));
  const data=generateDemo();
  renderResult(data);
  btn.disabled=false;btn.textContent='🔍 Quét lại ảnh này';
}
function generateDemo(){
  const idx=S.scanCount%BBOX_SETS.length;
  const comps=BBOX_SETS[idx].map(b=>{
    const p=PRICES[b.cls];
    return{class:b.cls,confidence:parseFloat((.62+Math.random()*.33).toFixed(2)),value_vnd:p.vnd,green_credits:p.credits,co2_saved_g:p.co2,metal:p.metal,bbox:b};
  });
  return{status:'demo_mode',components:comps};
}
function renderResult(data){
  S.scanCount++;
  const area=document.getElementById('result-area');
  document.getElementById('demo-tag').style.display=data.status!=='ok'?'inline-block':'none';
  S.scanResult=[...data.components];
  if(S.currentImgSrc){
    const bbWrap=document.getElementById('bb-wrap');
    const prev=document.getElementById('scan-preview-img');
    prev.src=S.currentImgSrc;bbWrap.style.display='block';
    prev.onload=()=>drawBBoxes(data.components);
  }
  renderCompList(S.scanResult);
  document.getElementById('edit-section').style.display='block';
  renderEditList();
  const vnd=S.scanResult.reduce((s,c)=>s+c.value_vnd,0);
  const sc=S.scanResult.reduce((s,c)=>s+c.green_credits,0);
  const sco2=S.scanResult.reduce((s,c)=>s+c.co2_saved_g,0);
  document.getElementById('total-vnd').textContent=vnd.toLocaleString()+' VND';
  S.boards++;S.co2+=sco2;S.totalVnd+=vnd;
  const ts=now();
  const txh=shash(`${S.boards}|${sc}|${ts}|${S.prevHash}`);S.prevHash=txh;
  S.scanHistory.unshift({time:ts,count:data.components.length,vnd,credits:sc,scanNum:S.scanCount});
  S.txChain.unshift({hash:txh,credits:sc,time:ts,type:'scan'});
  renderStats();renderHistoryLists();saveSession();
  document.getElementById('nsbar').style.display='flex';
  document.getElementById('nslabel').textContent=`Lần #${S.scanCount} — ${data.components.length} linh kiện`;
  document.getElementById('post-section').style.display='block';
  document.getElementById('post-summary').textContent=`${data.components.length} linh kiện — Bo mạch #${S.scanCount}`;
  document.getElementById('post-details').textContent=`Ước tính: ${vnd.toLocaleString()} VND · +${sc} tín chỉ`;
  document.getElementById('post-price').value=Math.round(vnd*.85);
  document.getElementById('post-title').value='';
  if(S.currentImgSrc) document.getElementById('post-thumb').innerHTML=`<img src="${S.currentImgSrc}" style="width:100%;height:100%;object-fit:cover">`;
}
function renderCompList(comps){
  const area=document.getElementById('result-area');
  if(!comps.length){area.innerHTML='<div class="empty">Không phát hiện linh kiện</div>';return;}
  area.innerHTML=`<div style="font-size:10px;color:var(--text2);margin-bottom:8px;font-family:var(--mono)">${comps.length} linh kiện · lần #${S.scanCount}</div>`+
  comps.map(c=>{
    const col=COMP_COLORS[c.class]||'#888';
    const nm=c.class.charAt(0).toUpperCase()+c.class.slice(1);
    const pct=Math.round(c.confidence*100);
    const cc=pct>=80?'var(--green)':pct>=65?'var(--yellow)':'var(--red)';
    return `<div class="comp-row">
      <div class="comp-dot" style="background:${col}"></div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700">${nm}</div>
        <div style="font-size:10px;color:var(--text2)">Kim loại: ${c.metal}</div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:${cc};font-family:var(--mono);margin-top:2px"><span>Conf: ${pct}%</span></div>
        <div class="conf-bar"><div class="conf-fill" style="width:${pct}%;background:${cc}"></div></div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px;font-weight:700;font-family:var(--mono)">${c.value_vnd.toLocaleString()}đ</div>
        <span class="tag tag-g">+${c.green_credits}</span>
      </div>
    </div>`;
  }).join('');
}
function drawBBoxes(comps){
  const img=document.getElementById('scan-preview-img');
  const canvas=document.getElementById('bb-canvas');
  canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;
  canvas.style.width=img.offsetWidth+'px';canvas.style.height=img.offsetHeight+'px';
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
  comps.forEach(c=>{
    if(!c.bbox)return;
    const{x,y,w,h}=c.bbox;
    const px=x*canvas.width,py=y*canvas.height,pw=w*canvas.width,ph=h*canvas.height;
    const col=COMP_COLORS[c.class]||'#fff';
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.strokeRect(px,py,pw,ph);
    ctx.fillStyle=col+'cc';
    const label=`${c.class.toUpperCase()} ${Math.round(c.confidence*100)}%`;
    ctx.font=`bold ${Math.max(9,canvas.width*.022)}px monospace`;
    const tw=ctx.measureText(label).width;
    const lh=Math.max(13,canvas.width*.032);
    ctx.fillRect(px,py-lh,tw+6,lh);
    ctx.fillStyle='#000';ctx.fillText(label,px+3,py-3);
  });
}
function resetScan(){
  document.getElementById('nsbar').style.display='none';
  document.getElementById('post-section').style.display='none';
  document.getElementById('bb-wrap').style.display='none';
  document.getElementById('edit-section').style.display='none';
  document.getElementById('result-area').innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>Tải ảnh và nhấn Phân tích</div>`;
  document.getElementById('total-vnd').textContent='—';
  document.getElementById('demo-tag').style.display='none';
  S.currentImgSrc=null;S.scanResult=null;
  const p=document.getElementById('prev');if(p){p.src='';p.style.display='none';}
  document.getElementById('drop-zone').style.display='block';
  document.getElementById('file-inp').value='';
  const cp=document.getElementById('cap-prev');if(cp){cp.src='';cp.style.display='none';}
  stopCam();
  document.getElementById('scan-btn').disabled=true;document.getElementById('scan-btn').textContent='🔍 Phân tích linh kiện';
  document.querySelectorAll('#pg-scan .tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-up').classList.add('on');
  document.getElementById('mode-upload').style.display='block';document.getElementById('mode-camera').style.display='none';
}

// EDIT
function renderEditList(){
  const el=document.getElementById('edit-list');if(!el)return;
  el.innerHTML=S.scanResult.map((c,i)=>`
    <div class="edit-row">
      <div class="comp-dot" style="background:${COMP_COLORS[c.class]||'#888'};margin-top:0"></div>
      <select class="edit-sel" onchange="updateComp(${i},this.value)">${ALL_CLS.map(cls=>`<option value="${cls}" ${cls===c.class?'selected':''}>${cls}</option>`).join('')}</select>
      <span style="font-size:10px;color:var(--text2);font-family:var(--mono);flex:1;text-align:right">${c.value_vnd.toLocaleString()}đ</span>
      <button class="edit-del" onclick="removeComp(${i})">✕</button>
    </div>`).join('');
}
function updateComp(i,cls){S.scanResult[i].class=cls;const p=PRICES[cls];S.scanResult[i].value_vnd=p.vnd;S.scanResult[i].green_credits=p.credits;S.scanResult[i].co2_saved_g=p.co2;S.scanResult[i].metal=p.metal;applyEdits();}
function removeComp(i){S.scanResult.splice(i,1);applyEdits();}
function addCompManual(){const cls='resistor';const p=PRICES[cls];S.scanResult.push({class:cls,confidence:.5,value_vnd:p.vnd,green_credits:p.credits,co2_saved_g:p.co2,metal:p.metal,bbox:null});applyEdits();}
function applyEdits(){
  renderCompList(S.scanResult);renderEditList();
  const vnd=S.scanResult.reduce((s,c)=>s+c.value_vnd,0);
  document.getElementById('total-vnd').textContent=vnd.toLocaleString()+' VND';
  document.getElementById('post-summary').textContent=`${S.scanResult.length} linh kiện (đã chỉnh sửa)`;
}

// ═══════════════════════════════════════════════════
function selOpt(v){
  S.pickupMode=v;
  document.getElementById('opt-dropoff').classList.toggle('sel',v==='dropoff');
  document.getElementById('opt-pickup').classList.toggle('sel',v==='pickup');
  document.getElementById('pickup-info').style.display=v==='pickup'?'block':'none';
}
function submitPost(){
  if(!S.scanResult){toast('Vui lòng quét bo mạch trước!','error');return;}
  const title=document.getElementById('post-title').value.trim()||`Bo mạch #${S.scanCount}`;
  const price=parseInt(document.getElementById('post-price').value)||0;
  const addr=[document.getElementById('post-addr').value,document.getElementById('post-district').value,document.getElementById('post-city').value].filter(Boolean).join(', ')||'TP.HCM';
  const seller=document.getElementById('post-name').value||S.user;
  const phone=document.getElementById('post-phone').value||'—';
  const note=document.getElementById('post-note').value||'';
  const sco2=S.scanResult.reduce((s,c)=>s+c.co2_saved_g,0);
  const sc=S.scanResult.reduce((s,c)=>s+c.green_credits,0);
  const lat=20+Math.random()*65,lng=10+Math.random()*80;
  const newL={
    id:'u'+Date.now(),title,
    comps:S.scanResult.map(c=>({class:c.class,value_vnd:c.value_vnd,green_credits:c.green_credits,metal:c.metal,conf:c.confidence})),
    price,status:'open',method:S.pickupMode,addr,seller,phone,note,
    time:now(),co2:sco2,imgSrc:S.currentImgSrc,ownerId:S.user,lat,lng
  };
  listings.unshift(newL);saveListings();
  S.sellHistory.unshift({time:now(),title,price,status:'open',id:newL.id});
  const txh=shash(`sell|${Date.now()}|${S.prevHash}`);S.prevHash=txh;
  S.txChain.unshift({hash:txh,credits:0,time:now(),type:'sell',title});
  renderStats();renderHistoryLists();saveSession();
  document.getElementById('post-section').style.display='none';
  document.getElementById('nslabel').textContent=`Lần #${S.scanCount} — Đã đăng bán ✅`;
  toast('✅ Đăng bán thành công! Trạng thái: Open');
}

// ═══════════════════════════════════════════════════
// MY LISTINGS
// ═══════════════════════════════════════════════════
function renderMyListings(filter,btn){
  if(btn){document.querySelectorAll('#pg-mylistings .tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');}
  const container=document.getElementById('my-listing-list');if(!container)return;
  let myL=listings.filter(l=>l.ownerId===S.user);
  if(filter&&filter!=='all') myL=myL.filter(l=>l.status===filter);
  // Update mini stats
  const all=listings.filter(l=>l.ownerId===S.user);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('ml-open',all.filter(l=>l.status==='open').length);
  set('ml-pend',all.filter(l=>l.status==='pending').length);
  set('ml-done',all.filter(l=>l.status==='done').length);
  if(!myL.length){container.innerHTML='<div class="empty">Chưa có tin đăng nào</div>';return;}
  const stTag={open:'tag-g',pending:'tag-y',done:'tag-b'};
  const stLabel={open:'Open',pending:'Pending',done:'Done'};
  container.innerHTML=myL.map(l=>`
    <div class="my-listing-row" onclick="openModal('${l.id}')">
      <div class="ml-thumb">${l.imgSrc?`<img src="${l.imgSrc}" alt="">`:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.title}</div>
        <div style="font-size:10px;color:var(--text2)">${l.time} · ${l.addr.split(',').slice(-1)[0].trim()}</div>
        <div style="font-size:10px;color:var(--text2)">${l.method==='pickup'?'🚚 Thu tận nơi':'🏪 Mang ra điểm thu'}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px;font-weight:700;color:var(--green);font-family:var(--mono)">${l.price.toLocaleString()}đ</div>
        <span class="tag ${stTag[l.status]}">${stLabel[l.status]}</span>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════
// MARKET
// ═══════════════════════════════════════════════════
function renderMarket(filter){
  const grid=document.getElementById('market-grid');if(!grid)return;
  const empty=document.getElementById('market-empty');
  const isEnt=S.role==='enterprise';
  // Enterprise checklist
  const cl=document.getElementById('ent-checklist');
  if(cl){
    const openL=listings.filter(l=>l.status==='open');
    cl.innerHTML=openL.length?openL.map(l=>`
      <label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <input type="checkbox" class="route-cb" value="${l.id}" ${S.routeSelected.includes(l.id)?'checked':''} style="width:15px;height:15px;accent-color:var(--green)">
        <div style="flex:1"><div style="font-size:12px;font-weight:600">${l.title}</div><div style="font-size:10px;color:var(--text2)">${l.addr.split(',').slice(-1)[0].trim()} · ${l.seller}</div></div>
        <div style="text-align:right;flex-shrink:0"><div style="font-size:12px;font-weight:700;color:var(--green);font-family:var(--mono)">${l.price.toLocaleString()}đ</div><span class="tag tag-g">Open</span></div>
      </label>`).join(''):`<div style="font-size:11px;color:var(--text2);padding:8px 0">Không có đơn Open</div>`;
  }
  const items=filter==='all'?listings:listings.filter(l=>l.status===filter);
  if(!items.length){grid.innerHTML='';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';
  const stTag={open:'tag-g',pending:'tag-y',done:'tag-b'};
  const stLabel={open:'Open',pending:'Pending',done:'Done'};
  grid.innerHTML=items.map(l=>{
    const isMine=l.ownerId===S.user;
    const imgEl=l.imgSrc?`<div class="listing-img"><img src="${l.imgSrc}" alt=""></div>`:`<div class="listing-img"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
    const comps=l.comps.slice(0,2).map(c=>c.class).join(', ')+(l.comps.length>2?` +${l.comps.length-2}`:'');
    const mine=isMine?`<span class="mine-badge">Của tôi</span>`:'';
    return `<div class="listing-card" onclick="openModal('${l.id}')">
      ${imgEl}
      <div class="listing-body">
        <div class="listing-title">${l.title}${mine}</div>
        <div class="listing-sub">📦 ${comps} · 📍 ${l.addr.split(',').slice(-1)[0].trim()}</div>
        <div class="listing-footer"><span class="price">${l.price.toLocaleString()}đ</span><span class="tag ${stTag[l.status]}">${stLabel[l.status]}</span></div>
      </div>
    </div>`;
  }).join('');
}
function filterMkt(f,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderMarket(f);}

// ═══════════════════════════════════════════════════
// ROUTE
// ═══════════════════════════════════════════════════
function renderRoute(){
  const pins=document.getElementById('map-pins');if(!pins)return;
  const colorMap={open:'var(--green)',pending:'var(--yellow)',done:'var(--text3)'};
  pins.innerHTML=listings.map(l=>`
    <div class="map-pin" style="left:${l.lng}%;top:${l.lat}%">
      <div class="map-pin-dot" style="background:${colorMap[l.status]||'var(--text3)'};color:${colorMap[l.status]}"></div>
      <div class="map-pin-label">${l.title.substring(0,12)}…</div>
    </div>`).join('');
  const detail=document.getElementById('route-list');if(!detail)return;
  const selected=listings.filter(l=>S.routeSelected.includes(l.id));
  if(!selected.length){detail.innerHTML='<div class="empty">Chưa có điểm. Thêm từ tab Thu Mua.</div>';document.getElementById('route-confirm-btn').style.display='none';document.getElementById('route-info').style.display='none';return;}
  let totalDist=0;
  detail.innerHTML=selected.map((l,i)=>{const d=parseFloat((4+Math.random()*12).toFixed(1));totalDist+=d;return`
    <div class="comp-row">
      <div style="width:18px;height:18px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0">${i+1}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:700">${l.title}</div><div style="font-size:10px;color:var(--text2)">${l.addr}</div></div>
      <div style="text-align:right;flex-shrink:0"><div style="font-size:11px;font-family:var(--mono)">${d}km</div><span class="tag tag-g">${l.price.toLocaleString()}đ</span></div>
    </div>`;}).join('');
  document.getElementById('route-confirm-btn').style.display='block';
  const svg=document.getElementById('route-svg');if(svg){const depot={x:50,y:50};let path=`M${depot.x} ${depot.y}`;selected.forEach(l=>{path+=` L${l.lng} ${l.lat}`;});path+=` L${depot.x} ${depot.y}`;svg.innerHTML=`<path d="${path}" fill="none" stroke="rgba(0,214,143,.6)" stroke-width=".8" stroke-dasharray="3 2"/>`;}
  const info=document.getElementById('route-info');if(info)info.style.display='block';
  const km=document.getElementById('route-km');if(km)km.textContent=totalDist.toFixed(1)+' km';
  const cost=document.getElementById('route-cost');if(cost)cost.textContent=Math.round(totalDist*3500).toLocaleString()+'đ';
}
function addToRoute(){
  const checks=document.querySelectorAll('.route-cb:checked');
  if(!checks.length){toast('Chọn ít nhất 1 đơn hàng!','error');return;}
  checks.forEach(c=>{if(!S.routeSelected.includes(c.value))S.routeSelected.push(c.value);});
  toast(`✅ Đã thêm ${checks.length} điểm vào lộ trình`);
}
function confirmPickupSelected(){
  const checks=document.querySelectorAll('.route-cb:checked');
  if(!checks.length){toast('Chọn ít nhất 1 đơn!','error');return;}
  let cnt=0;
  checks.forEach(c=>{const l=listings.find(x=>x.id===c.value);if(l&&l.status==='open'){l.status='pending';cnt++;}});
  saveListings();renderStats();renderMarket('all');
  toast(`🚚 ${cnt} đơn → Pending. Xác nhận khi đã thu mua xong.`,'info');
}
function confirmAllRoute(){
  const selected=listings.filter(l=>S.routeSelected.includes(l.id)&&l.status==='pending');
  if(!selected.length){toast('Không có đơn Pending trong lộ trình!','error');return;}
  let totalCr=0,totalCo2=0;
  selected.forEach(l=>{
    l.status='done';
    const sc=l.comps.reduce((s,c)=>s+c.green_credits,0)*2;
    totalCr+=sc;totalCo2+=l.co2;
    const txh=shash(`confirm|${l.id}|${Date.now()}|${S.prevHash}`);S.prevHash=txh;
    S.txChain.unshift({hash:txh,credits:sc,time:now(),type:'confirm',title:l.title});
  });
  S.routeSelected=S.routeSelected.filter(id=>!selected.map(l=>l.id).includes(id));
  saveListings();renderStats();renderMarket('all');renderHistoryLists();renderRoute();saveSession();
  toast(`🎉 ${selected.length} đơn Done. +${totalCr} tín chỉ cộng cho người bán.`,'success',3000);
}

// ═══════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════
function openModal(id){
  const l=listings.find(x=>x.id===id);if(!l)return;
  S.currentListingId=id;
  document.getElementById('modal-title').textContent=l.title;
  const isEnt=S.role==='enterprise';
  const isMine=l.ownerId===S.user;
  const mt=l.method==='pickup'?'🚚 Thu tận nơi (3–7 ngày)':'🏪 Mang ra điểm thu';
  const st={open:'🟢 Open — Đang chờ thu mua',pending:'🟡 Pending — Đang thu gom',done:'✅ Done — Hoàn tất'}[l.status];
  let body=`
    ${l.imgSrc?`<div style="width:100%;height:110px;border-radius:8px;overflow:hidden;margin-bottom:12px"><img src="${l.imgSrc}" style="width:100%;height:100%;object-fit:cover"></div>`:''}
    <div class="card" style="margin-bottom:10px">
      <div class="ct">Danh sách linh kiện</div>
      ${l.comps.map(c=>`<div class="comp-row">
        <div class="comp-dot" style="background:${COMP_COLORS[c.class]||'#888'}"></div>
        <div style="flex:1"><span style="font-size:12px;font-weight:700">${c.class.charAt(0).toUpperCase()+c.class.slice(1)}</span>
        <span style="font-size:10px;color:var(--text2)"> · ${c.metal}</span></div>
        <div style="text-align:right"><span style="font-size:12px;font-family:var(--mono)">${c.value_vnd.toLocaleString()}đ</span>
        <span class="tag tag-g" style="margin-left:4px">+${c.green_credits}</span></div>
      </div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:10px">
      <div class="ct">Thông tin đơn hàng</div>
      <div class="info-row"><span class="il">Trạng thái</span><span>${st}</span></div>
      <div class="info-row"><span class="il">Giá bán</span><span style="color:var(--green);font-weight:700;font-family:var(--mono)">${l.price.toLocaleString()} VND</span></div>
      <div class="info-row"><span class="il">Phương thức</span><span>${mt}</span></div>
      <div class="info-row"><span class="il">Địa chỉ</span><span style="text-align:right;max-width:55%;word-break:break-word">${l.addr}</span></div>
      <div class="info-row"><span class="il">Người bán</span><span>${l.seller}</span></div>
      <div class="info-row"><span class="il">SĐT</span><a href="tel:${l.phone}" style="color:var(--blue)">${l.phone}</a></div>
      ${l.note?`<div class="info-row"><span class="il">Ghi chú</span><span>${l.note}</span></div>`:''}
      <div class="info-row"><span class="il">CO₂ tiết kiệm</span><span style="color:#4ade80;font-weight:700">${l.co2}g</span></div>
      <div class="info-row"><span class="il">Đăng lúc</span><span>${l.time}</span></div>
    </div>`;

  // Enterprise actions
  if(isEnt){
    if(l.status==='open'){
      body+=`<div class="btn-row" style="margin-bottom:10px">
        <button class="btn btn-g" style="flex:1" onclick="buyNow('${l.id}')">🛒 Mua ngay → Pending</button>
        <button class="btn btn-blue" style="flex:1" onclick="addSingleToRoute('${l.id}')">🗺️ Thêm vào lộ trình</button>
      </div>`;
    } else if(l.status==='pending'){
      body+=`<div class="alert-box">⚠️ Xác nhận khi đã thực sự thu mua xong. Tín chỉ sẽ được cộng cho người bán.</div>
      <button class="btn btn-g btn-w" style="margin-bottom:10px" onclick="confirmSingle('${l.id}')">✅ Xác nhận đã thu mua → Cộng điểm người bán</button>`;
    }
  }

  // Chat
  body+=`<div class="card">
    <div class="ct">💬 Chat</div>
    <div class="chat-area" id="chat-area"></div>
    <div class="chat-inp-row">
      <input class="chat-inp" id="chat-inp" placeholder="Nhắn tin..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn btn-g" onclick="sendMsg()">Gửi</button>
    </div>
    <div class="qmr">
      <button class="btn btn-o" style="font-size:10px;padding:3px 8px" onclick="qm('Còn hàng không?')">Còn hàng?</button>
      <button class="btn btn-o" style="font-size:10px;padding:3px 8px" onclick="qm('Giá có thể thương lượng không?')">Giá?</button>
      <button class="btn btn-o" style="font-size:10px;padding:3px 8px" onclick="qm('Khi nào giao được?')">Lịch giao?</button>
      ${isEnt&&l.status==='open'?`<button class="btn btn-o" style="font-size:10px;padding:3px 8px" onclick="qm('Tôi muốn mua, có thể chốt không?')">Chốt mua</button>`:''}
    </div>
  </div>`;

  document.getElementById('modal-body').innerHTML=body;
  renderChat(id);
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on');}

// Enterprise buy actions
function buyNow(id){
  const l=listings.find(x=>x.id===id);if(!l||l.status!=='open')return;
  l.status='pending';saveListings();
  if(!S.routeSelected.includes(id)) S.routeSelected.push(id);
  renderStats();renderMarket('all');
  document.getElementById('modal').classList.remove('on');
  toast('🚚 Đã chuyển sang Pending — Đang đi lấy hàng!','info');
}
function addSingleToRoute(id){
  if(!S.routeSelected.includes(id)) S.routeSelected.push(id);
  toast('✅ Đã thêm vào lộ trình. Xem tại tab Lộ trình.','success');
  closeModal();
}
function confirmSingle(id){
  const l=listings.find(x=>x.id===id);if(!l)return;
  l.status='done';
  const sc=l.comps.reduce((s,c)=>s+c.green_credits,0)*2;
  const txh=shash(`confirm|${id}|${Date.now()}|${S.prevHash}`);S.prevHash=txh;
  S.txChain.unshift({hash:txh,credits:sc,time:now(),type:'confirm',title:l.title});
  S.routeSelected=S.routeSelected.filter(x=>x!==id);
  saveListings();renderStats();renderMarket('all');renderHistoryLists();saveSession();
  closeModal();
  toast(`🎉 Xác nhận xong! +${sc} tín chỉ cộng cho người bán.`,'success',3000);
}

// ═══════════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════════
function renderChat(id){
  const area=document.getElementById('chat-area');if(!area)return;
  if(!S.chatHistory[id]) S.chatHistory[id]=[{me:false,text:'Xin chào! Bạn cần hỏi gì về sản phẩm?',time:now()}];
  area.innerHTML=S.chatHistory[id].map(m=>`<div class="msg ${m.me?'msg-me':'msg-other'}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('');
  area.scrollTop=area.scrollHeight;
}
function sendMsg(){
  const inp=document.getElementById('chat-inp');const txt=inp.value.trim();
  if(!txt||!S.currentListingId)return;
  S.chatHistory[S.currentListingId].push({me:true,text:txt,time:now()});
  inp.value='';renderChat(S.currentListingId);
  setTimeout(()=>{
    const replies=['Dạ còn hàng!','Giá này cố định rồi bạn.','Tôi có thể sắp xếp giao trong tuần.','OK bạn!','Liên hệ SĐT nhé.','Cảm ơn bạn đã quan tâm!'];
    S.chatHistory[S.currentListingId].push({me:false,text:replies[Math.floor(Math.random()*replies.length)],time:now()});
    renderChat(S.currentListingId);
  },700+Math.random()*600);
}
function qm(t){document.getElementById('chat-inp').value=t;sendMsg();}

// ═══════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════
function switchHTab(t,btn){
  document.querySelectorAll('#pg-history .tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['scan','sell','tx'].forEach(n=>{const el=document.getElementById('ht-'+n);if(el)el.style.display=n===t?'block':'none';});
}
function renderHistoryLists(){
  const scanEl=document.getElementById('h-scan-list');
  if(scanEl) scanEl.innerHTML=S.scanHistory.length?S.scanHistory.map(h=>`
    <div class="hist-item">
      <div class="hist-icon"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg></div>
      <div style="flex:1"><div style="font-size:12px;font-weight:700">Lần #${h.scanNum} — ${h.count} linh kiện</div><div style="font-size:10px;color:var(--text2)">${h.time}</div></div>
      <div style="text-align:right"><div style="font-size:12px;color:var(--green);font-family:var(--mono);font-weight:700">+${h.credits}</div><div style="font-size:10px;color:var(--text2)">${h.vnd.toLocaleString()}đ</div></div>
    </div>`).join(''):`<div class="empty">Chưa có lịch sử quét</div>`;

  const sellEl=document.getElementById('h-sell-list');
  if(sellEl) sellEl.innerHTML=S.sellHistory.length?S.sellHistory.map(h=>{
    const l=listings.find(x=>x.id===h.id);const st=l?l.status:'open';
    const sc={open:'tag-g',pending:'tag-y',done:'tag-b'}[st];const sl={open:'Open',pending:'Pending',done:'Done'}[st];
    return `<div class="hist-item" onclick="openModal('${h.id}')" style="cursor:pointer">
      <div class="hist-icon"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg></div>
      <div style="flex:1"><div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px">${h.title}</div><div style="font-size:10px;color:var(--text2)">${h.time}</div></div>
      <div style="text-align:right"><div style="font-size:12px;color:var(--yellow);font-family:var(--mono)">${h.price.toLocaleString()}đ</div><span class="tag ${sc}">${sl}</span></div>
    </div>`;
  }).join(''):`<div class="empty">Chưa có đơn</div>`;

  const txEl=document.getElementById('h-tx-list');
  const icons={scan:'🔍',sell:'📤',confirm:'✅',redeem:'🎁'};
  const labels={scan:'Quét',sell:'Đăng bán',confirm:'Xác nhận Done',redeem:'Đổi tín chỉ'};
  if(txEl) txEl.innerHTML=S.txChain.length?S.txChain.map(t=>`
    <div class="tx-item">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px">
        <span style="font-size:11px;font-weight:600">${icons[t.type]||'📌'} ${labels[t.type]||t.type}${t.title?' — '+t.title.substring(0,18)+'…':''}</span>
        <span style="font-size:10px;color:var(--text2)">${t.time}</span>
      </div>
      ${t.credits?`<span style="font-size:11px;color:var(--green);font-family:var(--mono)">+${t.credits} tín chỉ</span>`:''}
      <div class="tx-hash">Hash: ${t.hash}</div>
    </div>`).join(''):`<div class="empty">Chưa có giao dịch</div>`;
}

// PROFILE
function redeem(cost,name){
  if(S.credits<cost){toast(`Cần ${cost} tín chỉ. Hiện có: ${S.credits}`,'error');return;}
  if(!confirm(`Đổi "${name}" với ${cost} tín chỉ?`))return;
  S.credits-=cost;
  const txh=shash(`redeem|${cost}|${Date.now()}|${S.prevHash}`);S.prevHash=txh;
  S.txChain.unshift({hash:txh,credits:cost,time:now(),type:'redeem'});
  renderStats();renderHistoryLists();saveSession();
  toast(`✅ Đổi thành công: ${name}. Còn lại: ${S.credits} tín chỉ`,'success',3000);
}
</script>
</body>
