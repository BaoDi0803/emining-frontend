<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Mining AI — Khai khoáng rác điện tử</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px;
            display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: #1D9E75; border-radius: 8px;
          display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; }
  h1 { font-size: 16px; font-weight: 600; }
  .subtitle { font-size: 12px; color: #8b949e; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: #8b949e; margin-bottom: 12px;
                text-transform: uppercase; letter-spacing: 0.5px; }
  #drop-zone { border: 2px dashed #30363d; border-radius: 10px; padding: 32px 16px;
               text-align: center; cursor: pointer; transition: all 0.2s; }
  #drop-zone:hover, #drop-zone.drag-over { border-color: #1D9E75; background: rgba(29,158,117,0.05); }
  #drop-zone p { font-size: 13px; color: #8b949e; margin-top: 8px; }
  #preview { width: 100%; border-radius: 8px; display: none; margin-bottom: 12px; }
  .btn { width: 100%; padding: 10px; background: #1D9E75; color: white; border: none;
         border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #15785a; }
  .btn:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
  .comp-item { display: flex; align-items: center; gap: 10px; padding: 10px 0;
               border-bottom: 1px solid #21262d; }
  .comp-item:last-child { border-bottom: none; }
  .comp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .comp-name { font-size: 13px; font-weight: 500; flex: 1; }
  .comp-val { font-size: 12px; color: #8b949e; }
  .comp-credit { font-size: 11px; background: rgba(29,158,117,0.15); color: #1D9E75;
                 padding: 2px 7px; border-radius: 4px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: #161b22; border: 1px solid #30363d; border-radius: 10px;
          padding: 14px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
  .stat-label { font-size: 11px; color: #8b949e; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 120px; color: #8b949e; font-size: 13px; }
  .empty svg { width: 32px; height: 32px; stroke: #30363d; fill: none; stroke-width: 1.5; margin-bottom: 8px; }
  .scanning { display: flex; align-items: center; justify-content: center; gap: 8px;
              min-height: 120px; color: #1D9E75; font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #1D9E75;
             border-radius: 50%; animation: spin 0.8s linear infinite; }
  .total-row { display: flex; justify-content: space-between; align-items: center;
               padding-top: 10px; margin-top: 6px; border-top: 1px solid #21262d; }
  .total-label { font-size: 12px; color: #8b949e; }
  .total-val { font-size: 18px; font-weight: 600; color: #1D9E75; }
  .badge-demo { background: rgba(186,117,23,0.15); color: #EF9F27; font-size: 11px;
                padding: 3px 8px; border-radius: 4px; margin-left: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
  </div>
  <div>
    <h1>E-Mining AI</h1>
    <div class="subtitle">Khai khoáng rác điện tử bằng trí tuệ nhân tạo</div>
  </div>
</div>

<div class="container">

  <div class="stat-grid">
    <div class="stat">
      <div class="stat-val" id="s-credits" style="color:#1D9E75;">0</div>
      <div class="stat-label">Tín chỉ xanh</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-boards">0</div>
      <div class="stat-label">Bo mạch đã quét</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-co2" style="color:#639922;">0g</div>
      <div class="stat-label">CO₂ tiết kiệm</div>
    </div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="card-title">Tải ảnh bo mạch</div>
      <div id="drop-zone" onclick="document.getElementById('file-input').click()"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="handleDrop(event)">
        <svg style="width:40px;height:40px;stroke:#1D9E75;fill:none;stroke-width:1.5" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Nhấn để chọn ảnh hoặc kéo thả</p>
        <p style="font-size:11px;margin-top:4px;">JPG, PNG — ảnh bo mạch PCB</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
      <img id="preview" alt="preview">
      <button class="btn" id="scan-btn" onclick="scan()" disabled>Phân tích linh kiện</button>
    </div>

    <div class="card">
      <div class="card-title">Kết quả nhận diện</div>
      <div id="results-area">
        <div class="empty">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="12" y2="17"/>
          </svg>
          Tải ảnh lên và nhấn Phân tích
        </div>
      </div>
      <div class="total-row">
        <span class="total-label">Giá trị thu hồi ước tính</span>
        <span class="total-val" id="total-vnd">— VND</span>
      </div>
    </div>

  </div>

</div>

<script>
// THAY DÒNG NÀY bằng URL Render của bạn
const API_URL = "https://emining-backend.onrender.com";

const COLORS = {
  chip: "#1D9E75", capacitor: "#534AB7", connector: "#EF9F27",
  resistor: "#D85A30", transistor: "#185FA5", diode: "#D4537E",
};

let totalCredits = 0, totalBoards = 0, totalCo2 = 0;
let selectedFile = null;

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadPreview(file);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (file) loadPreview(file);
}

function loadPreview(file) {
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    const preview = document.getElementById('preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById('scan-btn').disabled = false;
    document.getElementById('drop-zone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function scan() {
  if (!selectedFile) return;
  const btn = document.getElementById('scan-btn');
  const area = document.getElementById('results-area');
  btn.disabled = true;
  btn.textContent = 'Đang phân tích...';
  area.innerHTML = `<div class="scanning"><div class="spinner"></div>AI đang nhận diện linh kiện...</div>`;

  try {
    const formData = new FormData();
    formData.append('file', selectedFile);

    const res = await fetch(`${API_URL}/scan`, { method: 'POST', body: formData });
    const data = await res.json();
    renderResults(data);
  } catch (err) {
    // Nếu API chưa sẵn sàng, dùng demo data
    renderResults({
      status: "demo_mode",
      components: [
        { class: "chip", confidence: 0.91, value_vnd: 45000, green_credits: 15, co2_saved_g: 120, metal: "Au, Ag" },
        { class: "connector", confidence: 0.87, value_vnd: 32000, green_credits: 10, co2_saved_g: 85, metal: "Au" },
        { class: "capacitor", confidence: 0.82, value_vnd: 8000, green_credits: 3, co2_saved_g: 22, metal: "Al" },
      ],
      total_vnd: 85000,
      total_credits: 28,
    });
  } finally {
    btn.disabled = false;
    btn.textContent = 'Quét lại';
  }
}

function renderResults(data) {
  const area = document.getElementById('results-area');
  const isDemo = data.status === "demo_mode";

  if (!data.components || data.components.length === 0) {
    area.innerHTML = `<div class="empty">Không tìm thấy linh kiện. Thử ảnh khác.</div>`;
    document.getElementById('total-vnd').textContent = '0 VND';
    return;
  }

  let html = '';
  let co2Total = 0;

  data.components.forEach(c => {
    const color = COLORS[c.class] || '#8b949e';
    co2Total += c.co2_saved_g || 0;
    html += `
      <div class="comp-item">
        <div class="comp-dot" style="background:${color}"></div>
        <div style="flex:1">
          <div class="comp-name">${c.class.charAt(0).toUpperCase() + c.class.slice(1)}</div>
          <div class="comp-val">Kim loại: ${c.metal} · Conf: ${Math.round(c.confidence * 100)}%</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:500">${c.value_vnd.toLocaleString()} đ</div>
          <span class="comp-credit">+${c.green_credits} xanh</span>
        </div>
      </div>`;
  });

  const demoTag = isDemo ? `<span class="badge-demo">Demo</span>` : '';
  area.innerHTML = `<div style="display:flex;align-items:center;margin-bottom:8px">
    <span style="font-size:12px;color:#8b949e;">${data.components.length} linh kiện phát hiện</span>${demoTag}
  </div>${html}`;

  document.getElementById('total-vnd').textContent = data.total_vnd.toLocaleString() + ' VND';

  totalCredits += data.total_credits || 0;
  totalBoards++;
  totalCo2 += co2Total;
  document.getElementById('s-credits').textContent = totalCredits;
  document.getElementById('s-boards').textContent = totalBoards;
  document.getElementById('s-co2').textContent = totalCo2 + 'g';
}
</script>
</body>
</html>
